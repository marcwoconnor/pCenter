openapi: 3.0.3
info:
  title: pCenter API
  version: 0.1.0
  description: |
    pCenter is a multi-cluster Proxmox datacenter manager.

    **Coverage note:** this spec currently covers authentication, cluster/node inventory,
    and guest (VM/container) endpoints — roughly 25 of the 213 routes the backend exposes.
    Remaining route groups (ACME, pools, backup, scheduler, alarms, metrics, RBAC, tags,
    library, folders, SDN, HA, DRS, inventory) will be added incrementally; see the
    `roadmap` + `phase-3` labeled GitHub issues.

    ## Authentication flow

    1. `POST /api/auth/login` with `{username, password}`. On success you receive either:
       - `LoginResponse` — session is fully authenticated; a `session` cookie is set and
         the response body contains a `csrf_token` string.
       - `TOTPRequiredResponse` — partial session established; caller must complete
         2FA via `POST /api/auth/verify-totp`.
    2. Subsequent authenticated requests send the `session` cookie automatically
       (HttpOnly) and, for mutating methods (POST/PUT/DELETE), must include the
       `X-CSRF-Token` header echoing the `csrf_token` from the login/me response.
    3. `POST /api/auth/logout` terminates the session.

servers:
  - url: /
    description: Same-origin (default deployment)

tags:
  - name: auth
    description: Login, sessions, TOTP, password, admin user management
  - name: clusters
    description: Cluster/node inventory and summaries
  - name: guests
    description: VMs, containers, and combined guest listings
  - name: webhooks
    description: Outbound webhook endpoints for event dispatch (admin-only)
  - name: meta
    description: Health, version, and the OpenAPI spec itself

security:
  - sessionCookie: []
    csrfToken: []

paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /api/openapi.yaml:
    get:
      tags: [meta]
      summary: This OpenAPI spec (YAML)
      security: []
      responses:
        '200':
          description: YAML spec
          content:
            application/yaml:
              schema: { type: string }

  /api/openapi.json:
    get:
      tags: [meta]
      summary: This OpenAPI spec (JSON)
      security: []
      responses:
        '200':
          description: JSON spec
          content:
            application/json:
              schema: { type: object }

  /api/swagger-ui/swagger-ui.css:
    get:
      tags: [meta]
      summary: Vendored Swagger UI stylesheet
      description: |
        Static asset backing `/api/docs`. Vendored at build time so the docs
        page works on air-gapped deploys without outbound internet access.
        Pinned version lives in `backend/internal/api/swagger-ui/README.md`.
      security: []
      responses:
        '200':
          description: CSS
          content:
            text/css:
              schema: { type: string }

  /api/swagger-ui/swagger-ui-bundle.js:
    get:
      tags: [meta]
      summary: Vendored Swagger UI bundle
      description: |
        Static asset backing `/api/docs`. Vendored at build time; see
        `/api/swagger-ui/swagger-ui.css` for rationale.
      security: []
      responses:
        '200':
          description: JavaScript
          content:
            application/javascript:
              schema: { type: string }

  /api/version:
    get:
      tags: [meta]
      summary: Server version and update check
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema: { type: object }

  # === Auth ===

  /api/auth/login:
    post:
      tags: [auth]
      summary: Log in with username + password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login succeeded (or TOTP required)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/TOTPRequiredResponse'
        '401': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register the first user (only when zero users exist)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Registered; auto-logged in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '403':
          description: Registration closed (users already exist)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/user-count:
    get:
      tags: [auth]
      summary: How many users exist (used to show first-run UI)
      security: []
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /api/auth/check:
    get:
      tags: [auth]
      summary: Whether the caller has a valid session (unauthenticated probe)
      security: []
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated: { type: boolean }

  /api/auth/me:
    get:
      tags: [auth]
      summary: Current user + CSRF token
      responses:
        '200':
          description: Session owner
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { $ref: '#/components/responses/Error' }

  /api/auth/logout:
    post:
      tags: [auth]
      summary: End the current session
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Error' }

  /api/auth/verify-totp:
    post:
      tags: [auth]
      summary: Complete 2FA after login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyTOTPRequest' }
      responses:
        '200':
          description: TOTP accepted; session promoted to full auth
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { $ref: '#/components/responses/Error' }

  /api/auth/password:
    put:
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: Password changed }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }

  /api/auth/sessions:
    get:
      tags: [auth]
      summary: List own active sessions
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Error' }

  /api/auth/sessions/{id}:
    delete:
      tags: [auth]
      summary: Revoke a specific session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Revoked }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  # === Clusters / nodes ===

  /api/summary:
    get:
      tags: [clusters]
      summary: Global summary across all clusters
      responses:
        '200':
          description: Aggregate counts and resources
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Error' }

  /api/clusters:
    get:
      tags: [clusters]
      summary: All configured clusters
      responses:
        '200':
          description: Clusters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cluster' }
        '401': { $ref: '#/components/responses/Error' }

  /api/nodes:
    get:
      tags: [clusters]
      summary: All nodes across all clusters
      responses:
        '200':
          description: Nodes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Node' }
        '401': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/summary:
    get:
      tags: [clusters]
      summary: Summary for one cluster
      parameters:
        - $ref: '#/components/parameters/ClusterName'
      responses:
        '200':
          description: Cluster summary
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/nodes:
    get:
      tags: [clusters]
      summary: Nodes in one cluster
      parameters:
        - $ref: '#/components/parameters/ClusterName'
      responses:
        '200':
          description: Nodes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Node' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/ceph:
    get:
      tags: [clusters]
      summary: Cluster-wide Ceph topology snapshot
      description: |
        Returns the full Ceph topology cached by the poller — OSDs, MONs,
        MGRs, MDSs, pools, CRUSH rules, CephFS instances, and OSD flags.
        Returns 404 when the cluster has no Ceph installed or hasn't been
        polled yet. The cadence is ~30s; back-to-back calls within a tick
        return identical responses.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
      responses:
        '200':
          description: Ceph topology
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/ceph/pool:
    post:
      tags: [clusters]
      summary: Create a Ceph pool
      description: |
        Creates a Ceph pool. Required: name. Optional: size, min_size,
        pg_num, pg_autoscale_mode (on/off/warn), application
        (rbd/cephfs/rgw), crush_rule, add_storages. Zero-valued numeric
        fields use PVE defaults. Returns the UPID of the create task.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                size: { type: integer }
                min_size: { type: integer }
                pg_num: { type: integer }
                pg_autoscale_mode: { type: string, enum: [on, off, warn] }
                application: { type: string, enum: [rbd, cephfs, rgw] }
                crush_rule: { type: string }
                add_storages: { type: boolean }
      responses:
        '200':
          description: Task started
          content:
            application/json:
              schema:
                type: object
                properties: { upid: { type: string } }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/ceph/pool/{pool}:
    put:
      tags: [clusters]
      summary: Update a Ceph pool's mutable fields
      description: |
        Updates an existing pool. At least one of size, min_size, pg_num,
        pg_autoscale_mode, application, or crush_rule must be set.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
        - in: path
          name: pool
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                size: { type: integer }
                min_size: { type: integer }
                pg_num: { type: integer }
                pg_autoscale_mode: { type: string, enum: [on, off, warn] }
                application: { type: string, enum: [rbd, cephfs, rgw] }
                crush_rule: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties: { status: { type: string } }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }
    delete:
      tags: [clusters]
      summary: Delete a Ceph pool
      description: |
        Deletes a pool. Use force=1 to override the "pool has data" check
        and remove_storages=1 to also drop PVE Storage entries pointing at
        this pool. Returns the UPID of the delete task.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
        - in: path
          name: pool
          required: true
          schema: { type: string }
        - in: query
          name: force
          schema: { type: string, enum: ["1"] }
        - in: query
          name: remove_storages
          schema: { type: string, enum: ["1"] }
      responses:
        '200':
          description: Task started
          content:
            application/json:
              schema:
                type: object
                properties: { upid: { type: string } }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/ceph/flags/{flag}:
    post:
      tags: [clusters]
      summary: Set or unset a cluster-wide Ceph OSD flag
      description: |
        Toggles a cluster-wide OSD flag. Allowed flags: noout, noin, noup,
        nodown, nobackfill, norebalance, norecover, noscrub, nodeep-scrub,
        pause. Other PVE-accepted flags are intentionally not exposed.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
        - in: path
          name: flag
          required: true
          schema:
            type: string
            enum: [noout, noin, noup, nodown, nobackfill, norebalance, norecover, noscrub, nodeep-scrub, pause]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enable]
              properties:
                enable: { type: boolean }
      responses:
        '200':
          description: Flag toggled
          content:
            application/json:
              schema:
                type: object
                properties: { status: { type: string } }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }

  # === Guests ===

  /api/guests:
    get:
      tags: [guests]
      summary: All guests (VMs + containers) across all clusters
      responses:
        '200':
          description: Guests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Guest' }
        '401': { $ref: '#/components/responses/Error' }

  /api/vms:
    get:
      tags: [guests]
      summary: All VMs
      responses:
        '200':
          description: VMs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Guest' }
        '401': { $ref: '#/components/responses/Error' }

  /api/vms/{vmid}:
    get:
      tags: [guests]
      summary: VM by id (searches all clusters)
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guest' }
        '404': { $ref: '#/components/responses/Error' }

  /api/vms/{vmid}/{action}:
    post:
      tags: [guests]
      summary: Perform an action on a VM (start|stop|shutdown|reboot|reset|suspend|resume)
      parameters:
        - $ref: '#/components/parameters/VMID'
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [start, stop, shutdown, reboot, reset, suspend, resume]
      responses:
        '200':
          description: Task started (body includes UPID)
          content:
            application/json:
              schema: { type: object }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/containers:
    get:
      tags: [guests]
      summary: All containers
      responses:
        '200':
          description: Containers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Guest' }
        '401': { $ref: '#/components/responses/Error' }

  /api/containers/{vmid}:
    get:
      tags: [guests]
      summary: Container by id (searches all clusters)
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Container detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guest' }
        '404': { $ref: '#/components/responses/Error' }

  /api/containers/{vmid}/{action}:
    post:
      tags: [guests]
      summary: Perform an action on a container
      parameters:
        - $ref: '#/components/parameters/VMID'
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [start, stop, shutdown, reboot, suspend, resume]
      responses:
        '200':
          description: Task started
          content:
            application/json:
              schema: { type: object }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/guests:
    get:
      tags: [guests]
      summary: Guests in one cluster
      parameters:
        - $ref: '#/components/parameters/ClusterName'
      responses:
        '200':
          description: Guests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Guest' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  # === Storage vMotion (per-disk/volume move between storage pools) ===

  /api/clusters/{cluster}/vms/{vmid}/disk/move:
    post:
      tags: [guests]
      summary: Move a VM disk to a different storage pool (online, VM may be running)
      description: |
        Initiates a Proxmox `qm move_disk`. The VM stays on its current node;
        only the backing storage changes. Returns a UPID that can be polled via
        `GET /api/disk-moves`. The operation is online — no downtime required.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MoveDiskRequest' }
      responses:
        '200':
          description: Move started
          content:
            application/json:
              schema:
                type: object
                required: [upid]
                properties:
                  upid: { type: string }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/clusters/{cluster}/containers/{vmid}/volume/move:
    post:
      tags: [guests]
      summary: Move an LXC volume (rootfs / mpN) to a different storage pool
      description: |
        Initiates a Proxmox `pct move_volume`. **The container must be stopped** —
        PVE does not support online LXC volume moves today. Returns a UPID that
        can be polled via `GET /api/disk-moves`.
      parameters:
        - $ref: '#/components/parameters/ClusterName'
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MoveDiskRequest' }
      responses:
        '200':
          description: Move started
          content:
            application/json:
              schema:
                type: object
                required: [upid]
                properties:
                  upid: { type: string }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /api/disk-moves:
    get:
      tags: [guests]
      summary: List active / recently-completed storage vMotion operations
      responses:
        '200':
          description: In-flight disk moves across all clusters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DiskMoveProgress' }
        '401': { $ref: '#/components/responses/Error' }

  /api/disk-moves/{upid}:
    delete:
      tags: [guests]
      summary: Clear a completed/failed disk-move entry from the progress list
      description: |
        Removes a finished disk-move record from in-memory state. Does not
        affect PVE — the move itself has already completed.
      parameters:
        - in: path
          name: upid
          required: true
          schema: { type: string }
          description: PVE task UPID returned by the move endpoint.
      responses:
        '204': { description: Cleared }
        '404': { $ref: '#/components/responses/Error' }

  # === Webhooks (admin-only) ===

  /api/webhooks:
    get:
      tags: [webhooks]
      summary: List outbound webhook endpoints
      responses:
        '200':
          description: Endpoints
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WebhookEndpoint' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      tags: [webhooks]
      summary: Create an endpoint (secret is generated server-side, returned once)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookCreateRequest' }
      responses:
        '201':
          description: Created. **The returned `secret` is shown only once** — store it.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookCreateResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }

  /api/webhooks/{id}:
    put:
      tags: [webhooks]
      summary: Update endpoint (name, url, events, enabled — not secret)
      parameters:
        - $ref: '#/components/parameters/WebhookID'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookEndpoint' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [webhooks]
      summary: Delete endpoint
      parameters:
        - $ref: '#/components/parameters/WebhookID'
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/Error' }

  /api/webhooks/{id}/test:
    post:
      tags: [webhooks]
      summary: Fire a synthetic `webhook.test` event through the dispatcher
      description: |
        Enqueues a synthetic event. Delivery goes through the normal retry path,
        so admins see the same behaviour real events will have. Returns immediately;
        check `last_status` on the endpoint after a few seconds.
      parameters:
        - $ref: '#/components/parameters/WebhookID'
      responses:
        '200':
          description: Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: queued }
        '404': { $ref: '#/components/responses/Error' }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Opaque session token set on login; HttpOnly.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        Required on every state-changing request (POST/PUT/DELETE). Value is the
        `csrf_token` string returned by `/api/auth/login`, `/api/auth/me`, or
        `/api/auth/verify-totp`. Not required for safe methods (GET/HEAD).

  parameters:
    ClusterName:
      in: path
      name: cluster
      required: true
      schema: { type: string }
      description: Cluster name as configured in pCenter (matches `Cluster.name`).
    VMID:
      in: path
      name: vmid
      required: true
      schema: { type: integer, minimum: 100 }
      description: Proxmox VMID (unique per cluster; searches all clusters when called on global paths).
    WebhookID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: Webhook endpoint ID.

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid credentials

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin, user] }
        totp_enabled: { type: boolean }
        last_login: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Session:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        totp_verified: { type: boolean }
        ip_address: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      required: [user, csrf_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        csrf_token: { type: string }

    TOTPRequiredResponse:
      type: object
      required: [requires_totp, csrf_token]
      properties:
        requires_totp: { type: boolean, enum: [true] }
        csrf_token:
          type: string
          description: Use this on the follow-up `/api/auth/verify-totp` request.

    VerifyTOTPRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, example: "123456" }

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        email: { type: string }

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string, format: password }
        new_password: { type: string, format: password }

    MeResponse:
      type: object
      required: [user, csrf_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        csrf_token: { type: string }

    Cluster:
      type: object
      description: |
        Proxmox cluster as configured in pCenter. Fields are returned by the poller;
        see `backend/internal/state` for the source-of-truth struct.
      additionalProperties: true
      properties:
        name: { type: string }
        nodes:
          type: array
          items: { $ref: '#/components/schemas/Node' }

    Node:
      type: object
      description: Proxmox host node.
      additionalProperties: true
      properties:
        node: { type: string }
        cluster: { type: string }
        status: { type: string, example: online }
        cpu: { type: number, description: CPU usage 0..1 }
        mem: { type: integer, description: Used memory bytes }
        maxmem: { type: integer, description: Total memory bytes }
        uptime: { type: integer, description: Seconds }

    Guest:
      type: object
      description: |
        Unified shape for a VM or container. `type` discriminates.
        Additional Proxmox-native fields pass through.
      additionalProperties: true
      required: [vmid, type]
      properties:
        vmid: { type: integer }
        name: { type: string }
        type: { type: string, enum: [qemu, lxc] }
        node: { type: string }
        cluster: { type: string }
        status: { type: string, example: running }
        cpu: { type: number }
        maxcpu: { type: integer }
        mem: { type: integer }
        maxmem: { type: integer }
        uptime: { type: integer }

    MoveDiskRequest:
      type: object
      required: [disk, target_storage]
      description: |
        Request body for VM disk and CT volume moves. `disk` is the qemu disk
        key (scsi0, virtio0, ide0, sata0) for VMs or the lxc volume key
        (rootfs, mp0, mp1, ...) for containers. `format` is VM-only. `from_storage`
        is optional metadata, stored on the progress record for display.
      properties:
        disk:
          type: string
          example: scsi0
        target_storage:
          type: string
          example: ceph-pool-1
        delete_source:
          type: boolean
          default: false
          description: If true, PVE removes the source volume after the copy succeeds.
        format:
          type: string
          enum: [raw, qcow2, vmdk]
          description: VM only; omit or leave empty to keep the target storage's default.
        from_storage:
          type: string
          description: Optional source storage name (display-only; not passed to PVE).

    DiskMoveProgress:
      type: object
      required: [upid, cluster, vmid, guest_type, node, disk, to_storage, started_at, status]
      description: In-flight or recently-completed storage vMotion operation.
      properties:
        upid: { type: string }
        cluster: { type: string }
        vmid: { type: integer }
        guest_name: { type: string }
        guest_type: { type: string, enum: [vm, ct] }
        node: { type: string }
        disk: { type: string, example: scsi0 }
        from_storage: { type: string }
        to_storage: { type: string }
        delete_source: { type: boolean }
        started_at: { type: string, format: date-time }
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Coarse progress: 0 while running, flips to 100 when the PVE task
            reports OK. PVE's move_disk task log doesn't expose fine-grained
            percent in a stable machine-readable form, so intermediate values
            are not attempted.
        status: { type: string, enum: [running, completed, failed] }
        error: { type: string }

    WebhookEndpoint:
      type: object
      required: [id, name, url, enabled]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
          description: |
            Dotted event names (e.g. `vm.create`, `ct.migrate`). An empty array
            means the endpoint receives **all** events. Event names are derived
            from the activity log's `resource_type.action`.

            Per-component wildcards are supported: `vm.*` matches every VM
            action, `*.migrate` matches migrations across resource types, and
            `*.*` matches any two-component event. A bare `*` does NOT match
            a two-component event (component counts must agree).
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_fired_at: { type: string, format: date-time }
        last_status:
          type: string
          enum: ["", success, failure]
          description: Result of the most recent delivery attempt.

    WebhookCreateRequest:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        enabled: { type: boolean, default: true }

    WebhookCreateResponse:
      type: object
      required: [endpoint, secret]
      properties:
        endpoint: { $ref: '#/components/schemas/WebhookEndpoint' }
        secret:
          type: string
          description: |
            Shared secret for HMAC-SHA256 signature verification. **Returned
            exactly once on creation** — store it immediately. pCenter signs
            every outbound request as `X-pCenter-Signature: t=<unix>,v1=<hex>`
            where `v1 = hmac_sha256(secret, "<unix>.<body>")`.

    WebhookUpdateRequest:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        enabled: { type: boolean }
