name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Single source of truth: packaging/build-deb.sh handles frontend
      # build, backend build (with version ldflag), .deb assembly, postinst /
      # prerm / postrm, systemd unit, default config. Previously this step
      # inlined ~150 lines that drifted out of sync with the local script —
      # the v0.1.27 postinst-restart fix (#55) was applied to build-deb.sh
      # only, so CI-built .debs (the ones users actually install) kept the
      # old behavior and failed to restart on upgrade. Calling the shared
      # script eliminates that class of drift.
      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ./packaging/build-deb.sh "${VERSION}"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Pull lines between `## v<VERSION>` and the next `## ` heading.
          awk -v tag="## v${VERSION}" '
            $0 ~ "^"tag"($|[^0-9.])" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry for v${VERSION}; using minimal body." > release-notes.md
            echo "" >> release-notes.md
            echo "See commit history: https://github.com/marcwoconnor/pCenter/commits/v${VERSION}" >> release-notes.md
          fi

          echo '--- Release notes ---'
          cat release-notes.md

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: pcenter_*.deb
          body_path: release-notes.md

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: backend/pcenter
          body_path: release-notes.md

  update-apt-repo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Create gh-pages if needed
        run: |
          if [ ! -d gh-pages ]; then
            mkdir gh-pages
            cd gh-pages
            git init
            git checkout -b gh-pages
          fi

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download .deb from release
        run: |
          mkdir -p gh-pages/pool
          gh release download v${{ steps.version.outputs.VERSION }} \
            --repo marcwoconnor/pCenter \
            --pattern '*.deb' --dir gh-pages/pool/ --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_TTY: /dev/null

      - name: Generate APT repo metadata
        run: |
          cd gh-pages
          mkdir -p pool dists/stable/main/binary-amd64

          # Generate Packages file
          dpkg-scanpackages --multiversion pool/ > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          # Generate Release file
          cd dists/stable
          cat > Release << RELEASE
          Origin: pCenter
          Label: pCenter
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: pCenter APT Repository
          Date: $(date -Ru)
          RELEASE

          # Add hashes
          apt-ftparchive release . >> Release

          # Sign
          gpg --batch --yes --default-key "${{ secrets.APT_GPG_KEY_ID }}" \
            -abs -o Release.gpg Release
          gpg --batch --yes --default-key "${{ secrets.APT_GPG_KEY_ID }}" \
            --clearsign -o InRelease Release

      - name: Export public key
        run: |
          gpg --armor --export "${{ secrets.APT_GPG_KEY_ID }}" > gh-pages/pcenter.gpg.key

      - name: Create repo index page
        run: |
          cat > gh-pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>pCenter APT Repository</title></head>
          <body>
          <h1>pCenter APT Repository</h1>
          <h2>Quick Install</h2>
          <pre>
          curl -fsSL https://marcwoconnor.github.io/pCenter/pcenter.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/pcenter.gpg
          echo "deb [signed-by=/usr/share/keyrings/pcenter.gpg] https://marcwoconnor.github.io/pCenter stable main" | sudo tee /etc/apt/sources.list.d/pcenter.list
          sudo apt update
          sudo apt install pcenter
          </pre>
          </body>
          </html>
          HTML

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repo for v${{ steps.version.outputs.VERSION }}" || true
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/marcwoconnor/pCenter.git" HEAD:gh-pages --force
